<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0b0b0f" />
<title>Gallery | DJ Pulley De Barber</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  overflow-x:hidden;
  font-family:Inter;
  background:#0b0b0f;
  color:#fff;
}

.app{
  max-width:480px;
  margin:auto;
  padding-bottom:80px;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  z-index:999;
  padding:12px 16px;
  background:rgba(10,10,14,0.7);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex;
  align-items:center;
  gap:10px;
}

.header img{
  width:36px;
  height:36px;
  border-radius:10px;
}

.header h1{
  font-size:13px;
  font-weight:600;
}

/* HERO */
.hero{
  padding:18px 16px;
  text-align:center;
}

.hero h2{
  font-size:22px;
}

.hero p{
  font-size:12px;
  color:#aaa;
  margin-top:6px;
}

/* FILTERS */
.filters{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:10px 16px;
}

.filters button{
  font-size:11px;
  padding:6px 10px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  color:#fff;
  white-space:nowrap;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:8px;
  padding:10px 10px 90px;
}

.item{
  position:relative;
  overflow:hidden;
  border-radius:14px;
  aspect-ratio:1/1;
}

.item img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform 0.3s ease;
}

.item:active img{
  transform:scale(1.08);
}

.label{
  position:absolute;
  bottom:8px;
  left:8px;
  font-size:10px;
  background:rgba(0,0,0,0.5);
  padding:4px 8px;
  border-radius:20px;
  backdrop-filter:blur(10px);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  flex-direction:column;
  padding:20px;
}

.lightbox img{
  width:100%;
  max-width:380px;
  border-radius:16px;
}

.lightbox span{
  margin-top:10px;
  font-size:12px;
  color:#aaa;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  background:#25D366;
  color:#000;
  border:none;
  padding:10px 12px;
  border-radius:10px;
  font-weight:700;
}

/* BEFORE AFTER */
.compare{
  margin:10px 16px;
  position:relative;
  border-radius:14px;
  overflow:hidden;
}

.compare img{
  width:100%;
  display:block;
}

.compare .after{
  position:absolute;
  top:0;
  left:0;
  width:50%;
  overflow:hidden;
}

.compare input{
  width:100%;
  margin-top:6px;
}

/* NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  max-width:480px;
  margin:auto;
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:rgba(10,10,14,0.85);
  backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,0.06);
}

.bottom-nav a{
  color:#aaa;
  font-size:11px;
  text-decoration:none;
}

.bottom-nav a:hover{
  color:#25D366;
}
</style></head><body><div class="app"><div class="header">
<img src="https://pe56d.s3.amazonaws.com/o_1jmvhkagb1vs04ns7of5bh17r715.png" />
<h1>DJ PULLEY BARBER PORTFOLIO</h1>
</div><div class="hero">
<h2>Interactive Barber Portfolio</h2>
<p>Tap any style to view full cut details & experience.</p>
</div><!-- FILTERS --><div class="filters">
<button onclick="filterAll()">All</button>
<button>Fades</button>
<button>Beards</button>
<button>Kids</button>
<button>VIP</button>
</div><!-- BEFORE AFTER (SAMPLE) --><div class="compare">
<img src="https://source.unsplash.com/600x600/?african,man,before" />
<div class="after">
<img src="https://source.unsplash.com/600x600/?african,man,fade,after" />
</div>
<input type="range" min="0" max="100" value="50" oninput="document.querySelector('.after').style.width=this.value+'%';" />
</div><!-- GRID --><div class="grid"><div class="item" onclick="openLightbox(this)">
<img src="https://source.unsplash.com/600x600/?african,fade,barber" />
<div class="label">Skin Fade</div>
</div><div class="item" onclick="openLightbox(this)">
<img src="https://source.unsplash.com/600x600/?african,beard,lineup" />
<div class="label">Beard Line-up</div>
</div><div class="item" onclick="openLightbox(this)">
<img src="https://source.unsplash.com/600x600/?african,waves,hairstyle" />
<div class="label">Wave Cut</div>
</div><div class="item" onclick="openLightbox(this)">
<img src="https://source.unsplash.com/600x600/?african,kids,barber" />
<div class="label">Kids Cut</div>
</div><div class="item" onclick="openLightbox(this)">
<img src="https://source.unsplash.com/600x600/?african,luxury,barber" />
<div class="label">VIP Grooming</div>
</div><div class="item" onclick="openLightbox(this)">
<img src="https://source.unsplash.com/600x600/?african,clean,cut" />
<div class="label">Clean Cut</div>
</div></div></div><!-- LIGHTBOX --><div class="lightbox" id="lightbox">
<button class="close" onclick="closeLightbox()">Close</button>
<img id="lightboxImg" />
<span id="lightboxText"></span>
</div><!-- NAV --><div class="bottom-nav">
<a href="index.html">Home</a>
<a href="service.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="#">Book</a>
<a href="#">Contact</a>
</div><script>
function openLightbox(el){
  document.getElementById('lightbox').style.display='flex';
  document.getElementById('lightboxImg').src = el.querySelector('img').src;
  document.getElementById('lightboxText').innerText = el.innerText;
}

function closeLightbox(){
  document.getElementById('lightbox').style.display='none';
}

function filterAll(){
  document.querySelectorAll('.item').forEach(i=>i.style.display='block');
}
</script></body>
</html>
